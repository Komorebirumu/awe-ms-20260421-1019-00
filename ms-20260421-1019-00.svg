<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" aria-label="AI-Powered Niche Historical Document Stylizer for Genealogists">
  <style>
    .primary-color { fill: #007bff; } /* Deep Blue */
    .secondary-color { fill: #28a745; } /* Green */
    .accent-color { fill: #ffc107; } /* Amber */
    .background-color { fill: #f8f9fa; } /* Light Gray */
    .text-color { fill: #343a40; } /* Dark Gray */
    .icon-style { stroke: #343a40; stroke-width: 2; fill: none; }
    .text-element { font-family: 'Arial', sans-serif; font-size: 24px; fill: #343a40; }
    .title-element { font-family: 'Arial', sans-serif; font-size: 40px; font-weight: bold; fill: #343a40; }
    .subtitle-element { font-family: 'Arial', sans-serif; font-size: 30px; fill: #007bff; font-weight: bold; }
  </style>

  <rect width="800" height="600" class="background-color"/>

  <!-- Title -->
  <text x="50%" y="60" text-anchor="middle" class="title-element">AI-Powered Stylizer</text>
  <text x="50%" y="110" text-anchor="middle" class="subtitle-element">for Genealogists</text>

  <!-- Main Illustration Area -->
  <g transform="translate(100, 180)">

    <!-- Left Side: Document Input & AI -->
    <g>
      <!-- Historical Document Icon (e.g., old scroll or letter) -->
      <path d="M120,0 L120,150 L80,160 L80,10 Z" class="primary-color" />
      <rect x="80" y="10" width="40" height="150" rx="5" ry="5" class="primary-color" />
      <path d="M80 10 L120 0 L120 150 L80 160 Z" fill="#e9ecef" />
      <text x="100" y="100" text-anchor="middle" font-size="16" fill="#343a40">Old Document</text>

      <!-- AI Brain/Chip Icon -->
      <g transform="translate(180, 50) scale(0.8)">
        <circle cx="0" cy="0" r="50" class="secondary-color"/>
        <circle cx="0" cy="0" r="30" fill="#ffffff"/>
        <circle cx="-15" cy="-15" r="5" class="primary-color"/>
        <circle cx="15" cy="-15" r="5" class="primary-color"/>
        <circle cx="-15" cy="15" r="5" class="primary-color"/>
        <circle cx="15" cy="15" r="5" class="primary-color"/>
        <path d="M-25 -25 L-35 -35 M-25 25 L-35 35 M25 -25 L35 -35 M25 25 L35 35" stroke="#343a40" stroke-width="3" fill="none"/>
        <text x="0" y="5" text-anchor="middle" font-size="20" font-weight="bold" fill="#007bff">AI</text>
      </g>
    </g>

    <!-- Connecting Arrows (AI Processing) -->
    <g>
      <path d="M150 80 L220 80" class="icon-style" stroke-width="3" stroke="#ffc107"/>
      <polygon points="220,75 225,80 220,85" fill="#ffc107"/>
      <path d="M150 100 L220 100" class="icon-style" stroke-width="3" stroke="#ffc107"/>
      <polygon points="220,95 225,100 220,105" fill="#ffc107"/>
    </g>

    <!-- Right Side: Styled Document Output -->
    <g transform="translate(300, 0)">
      <!-- Stylized Historical Document Icon -->
      <rect x="80" y="10" width="40" height="150" rx="5" ry="5" class="secondary-color" />
      <path d="M120,0 L120,150 L80,160 L80,10 Z" class="secondary-color" />
      <path d="M80 10 L120 0 L120 150 L80 160 Z" fill="#c8e6c9" />
      <text x="100" y="100" text-anchor="middle" font-size="16" fill="#343a40">Stylized Doc</text>

      <!-- Stylized Elements (e.g., subtle lines, color tint) -->
      <line x1="85" y1="20" x2="115" y2="20" stroke="#a0a0a0" stroke-width="1"/>
      <line x1="85" y1="40" x2="115" y2="40" stroke="#a0a0a0" stroke-width="1"/>
      <line x1="85" y1="60" x2="115" y2="60" stroke="#a0a0a0" stroke-width="1"/>
      <line x1="85" y1="80" x2="115" y2="80" stroke="#a0a0a0" stroke-width="1"/>
      <line x1="85" y1="100" x2="115" y2="100" stroke="#a0a0a0" stroke-width="1"/>
      <line x1="85" y1="120" x2="115" y2="120" stroke="#a0a0a0" stroke-width="1"/>
    </g>
  </g>

  <!-- Icons representing Genealogists and their work -->
  <g transform="translate(100, 400)">
    <!-- Family Tree Icon -->
    <g transform="scale(0.8)">
      <circle cx="100" cy="50" r="15" class="primary-color"/>
      <circle cx="50" cy="120" r="15" class="accent-color"/>
      <circle cx="150" cy="120" r="15" class="accent-color"/>
      <circle cx="25" cy="190" r="15" class="secondary-color"/>
      <circle cx="75" cy="190" r="15" class="secondary-color"/>
      <circle cx="125" cy="190" r="15" class="secondary-color"/>
      <circle cx="175" cy="190" r="15" class="secondary-color"/>

      <line x1="100" y1="65" x2="50" y2="105" class="icon-style" stroke-width="3"/>
      <line x1="100" y1="65" x2="150" y2="105" class="icon-style" stroke-width="3"/>
      <line x1="50" y1="135" x2="25" y2="175" class="icon-style" stroke-width="3"/>
      <line x1="50" y1="135" x2="75" y2="175" class="icon-style" stroke-width="3"/>
      <line x1="150" y1="135" x2="125" y2="175" class="icon-style" stroke-width="3"/>
      <line x1="150" y1="135" x2="175" y2="175" class="icon-style" stroke-width="3"/>
    </g>
    <text x="100" y="280" text-anchor="middle" class="text-element">Family History</text>
  </g>

  <g transform="translate(300, 400)">
    <!-- Magnifying Glass Icon -->
    <g transform="scale(0.8)">
      <circle cx="50" cy="50" r="30" class="icon-style" stroke-width="3" fill="none"/>
      <circle cx="50" cy="50" r="25" fill="#f8f9fa"/>
      <line x1="50" y1="50" x2="70" y2="70" class="icon-style" stroke-width="3"/>
      <line x1="70" y1="70" x2="90" y2="90" class="icon-style" stroke-width="3"/>
      <line x1="50" y1="20" x2="50" y2="0" class="icon-style" stroke-width="3"/>
      <line x1="50" y1="0" x2="40" y2="-10" class="icon-style" stroke-width="3"/>
    </g>
    <text x="50" y="150" text-anchor="middle" class="text-element">Research</text>
  </g>

  <g transform="translate(500, 400)">
    <!-- Globe Icon -->
    <g transform="scale(0.8)">
      <circle cx="50" cy="50" r="40" class="icon-style" stroke-width="3" fill="none"/>
      <path d="M10 50 Q 50 -20 90 50" fill="none" stroke="#007bff" stroke-width="2"/>
      <path d="M10 50 Q 50 120 90 50" fill="none" stroke="#007bff" stroke-width="2"/>
      <circle cx="50" cy="50" r="35" fill="#f8f9fa"/>
      <circle cx="50" cy="50" r="5" class="primary-color"/>
      <path d="M50,10 L50,90 M10,50 L90,50" stroke="#007bff" stroke-width="1.5" fill="none"/>
    </g>
    <text x="50" y="150" text-anchor="middle" class="text-element">Global Reach</text>
  </g>

</svg>